services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: agentguard
      POSTGRES_PASSWORD: agentguard
      POSTGRES_DB: agentguard
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentguard -d agentguard"]
      interval: 5s
      timeout: 3s
      retries: 10

  mock-backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "examples.mock_backend.server:app", "--host", "0.0.0.0", "--port", "9000"]
    ports:
      - "9000:9000"
    restart: unless-stopped

  agentguard:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mock-backend:
        condition: service_started
    environment:
      AGENTGUARD_HOST: 0.0.0.0
      AGENTGUARD_PORT: 8080
      AGENTGUARD_UPSTREAM_URL: http://mock-backend:9000
      AGENTGUARD_REDIS_URL: redis://redis:6379/0
      AGENTGUARD_POSTGRES_DSN: postgresql+asyncpg://agentguard:agentguard@postgres:5432/agentguard
      AGENTGUARD_HITL_HMAC_SECRET: change-me-hitl-shared-secret
      AGENTGUARD_HITL_WEBHOOK_URL: http://approval-console:9001/inbox
      AGENTGUARD_POLICIES_PATH: /app/configs/policies.yaml
      AGENTGUARD_DLP_RULES_PATH: /app/configs/dlp_rules.yaml
      AGENTGUARD_IDEMPOTENCY_TTL: "3600"
      AGENTGUARD_IDEMPOTENCY_SECRET: change-me-idempotency-secret
    ports:
      - "8080:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8080/agentguard/health', timeout=2).status==200 else 1)\""]
      interval: 5s
      timeout: 3s
      retries: 20

  approval-console:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "examples.mock_approval_console.server:app", "--host", "0.0.0.0", "--port", "9001"]
    environment:
      AGENTGUARD_GATEWAY_URL: http://agentguard:8080
      AGENTGUARD_HITL_HMAC_SECRET: change-me-hitl-shared-secret
    depends_on:
      - agentguard
    ports:
      - "9001:9001"
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["uvicorn", "examples.dashboard.server:app", "--host", "0.0.0.0", "--port", "9002"]
    environment:
      AGENTGUARD_GATEWAY_URL: http://agentguard:8080
      AGENTGUARD_HITL_HMAC_SECRET: change-me-hitl-shared-secret
    depends_on:
      agentguard:
        condition: service_healthy
    ports:
      - "9002:9002"
    restart: unless-stopped
